<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figure, Figcaption e Picture</title>
</head>
<body>
    <figure>
        <img src="https://placehold.co/600x400" alt="Imagem de exemplo">
        <figcaption>Legenda da imagem</figcaption>
    </figure>

    <picture>
        <source srcset="https://placehold.co/600x400" media="(min-width: 600px)">
        <source srcset="https://placehold.co/300x200" media="(min-width: 300px)">
        <img src="https://placehold.co/150x100" alt="Imagem de exemplo para picture">
    </picture>
</body>
</html>
