<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Aprimorado</title>
    <style>
        canvas {
            position: absolute;
            background: #eeeeee; 
        }
    </style>
</head>
<body>
    <h1>Bouncing Ball</h1>
    <canvas id="canvas" width="850" height="400"></canvas>

    <script>
        let canvas;
        let ctx;
        let bouncingBall;
        let bouncingBallAnimation;

        window.onload = function () {
        canvas = document.getElementById("canvas");
        ctx = canvas.getContext("2d");
        // canvas.width = window.innerWidth;  // full screen
        // canvas.height = window.innerHeight;
        bouncingBall = new BouncingBall(ctx, canvas.width, canvas.height);
        bouncingBall.animate(0);
        };

        window.addEventListener("resize", function () {
        cancelAnimationFrame(bouncingBallAnimation);
        // canvas.width = window.innerWidth;
        // canvas.height = window.innerHeight;
        bouncingBall = new BouncingBall(ctx, canvas.width, canvas.height);
        bouncingBall.animate(0);
        });

        class BouncingBall {
        #ctx;
        #width;
        #height;
        constructor(ctx, width, height) {
            this.#ctx = ctx;
            this.#ctx.fillStyle = "#0000ff";
            this.#width = width;
            this.#height = height;
            this.radius = 20;
            this.g = 0.5; // gravity
            this.x = 50;
            this.y = 50;
            this.vx = 2;
            this.vy = 0;
            this.lastTime = 0;
            this.interval = 1000 / 60;
            this.timer = 0;
        }
        #drawBall() {
            this.#ctx.clearRect(0, 0, this.#width, this.#height);
            // this.#ctx.fillStyle = "#0000ff";
            this.#ctx.beginPath();
            this.#ctx.arc(this.x, this.y, this.radius, 0, 2 * Math.PI, true);
            this.#ctx.closePath();
            this.#ctx.fill();
        }
        animate(timeStamp) {
            const deltaTime = timeStamp - this.lastTime;
            this.lastTime = timeStamp;
            if (this.timer > this.interval) {
            this.vy += this.g;
            this.x += this.vx;
            this.y += this.vy;

            if (this.y > this.#height - this.radius) {
                this.y = this.#height - this.radius;
                this.vy *= -0.8;
            }
            if (this.x > this.#width + this.radius) {
                this.x = -this.radius;
            }
            if (this.y === this.#height - this.radius) {
                // console.log("bottom!");
                if (this.vx > 0) {
                this.vx *= 0.99;
                }
            }

            this.#drawBall();
            this.timer = 0;
            } else {
            this.timer += deltaTime;
            }

            bouncingBallAnimation = requestAnimationFrame(this.animate.bind(this));
        }
        }
    </script>
</body>
</html>
